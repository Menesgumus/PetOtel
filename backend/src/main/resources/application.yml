spring:
  application:
    name: ankara-pet-house-api
  config:
    import: optional:file:.env[.properties], optional:file:../.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/ankara_pet_house}
    username: ${SPRING_DATASOURCE_USERNAME:ankara_pet_house}
    password: ${SPRING_DATASOURCE_PASSWORD:ankara_pet_house}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

app:
  upload-dir: ${APP_UPLOAD_DIR:./uploads}
  frontend-origin: ${APP_FRONTEND_ORIGIN:http://localhost:3000}
  
  jwt:
    secret: ${APP_JWT_SECRET:very-long-secret-key-for-development-only-change-in-prod}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000} # 24 hours

  admin-seed:
    enabled: ${APP_ADMIN_SEED_ENABLED:false}
    username: ${APP_ADMIN_USERNAME:admin}
    email: ${APP_ADMIN_EMAIL:admin@ankarapethouse.com}
    password: ${APP_ADMIN_PASSWORD:admin}
